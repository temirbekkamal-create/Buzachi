<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Северное Бузачи</title>
<style>
:root{
  --dark:#1A2332;--brown:#2C1810;--muted:#5C6470;--bg:#F5F2EE;
  --line:#DDD8D2;--orange:#E85D04;--green:#2D6A4F;--red:#C1121F;
  --blue:#1A5276;--yellow:#E9C46A;--soft:#FAFAF8;--r:12px;
  --shadow:0 2px 10px rgba(44,24,16,.12);
  --tap:48px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--dark);font-size:15px;-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:inherit;font-size:15px}
.hidden{display:none!important}

/* AUTH */
#auth{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dark),var(--brown));padding:16px}
.auth-card{width:400px;max-width:100%;background:#fff;border-radius:18px;padding:28px;box-shadow:0 12px 36px rgba(0,0,0,.28)}
.logo{font-size:26px;font-weight:900;color:var(--brown)}.logo span{color:var(--orange)}
.sub{font-size:12px;color:var(--muted);margin:5px 0 20px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;text-transform:uppercase;font-weight:900;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;background:var(--soft);font-size:15px;min-height:var(--tap)}
.field input:focus,.field select:focus{outline:none;border-color:var(--orange)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:12px 16px;font-weight:900;cursor:pointer;background:#eee;color:var(--dark);min-height:var(--tap);transition:opacity .15s}
.btn:active{opacity:.75}
.btn-main{background:var(--orange);color:#fff;width:100%;padding:14px;font-size:16px}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-yellow{background:var(--yellow);color:var(--brown)}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--dark)}
.btn-sm{padding:8px 12px;font-size:13px;min-height:36px}
.demo{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
.err{background:#FFE5E7;color:var(--red);padding:10px 12px;border-radius:9px;font-size:13px;margin-bottom:10px}

/* APP SHELL */
#app{display:none;min-height:100vh;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
.top{height:54px;background:var(--dark);color:#fff;display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:10}
.top-logo{font-weight:900;font-size:15px;white-space:nowrap}
.top-logo span{color:var(--orange)}
.top-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.role{font-size:10px;text-transform:uppercase;font-weight:900;background:var(--orange);padding:3px 8px;border-radius:999px;white-space:nowrap}
.uname{font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.logout{background:rgba(255,255,255,.13);color:#fff;border:0;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:13px;min-height:36px}

/* TABS — horizontal scroll, no scrollbar visible */
.tabs{background:#fff;border-bottom:2px solid var(--line);display:flex;overflow-x:auto;overflow-y:hidden;padding:0 8px;position:sticky;top:54px;z-index:9;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:13px 11px;white-space:nowrap;color:var(--muted);font-weight:800;font-size:13px;border-bottom:3px solid transparent;cursor:pointer;flex-shrink:0;margin-bottom:-2px}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* CONTENT */
.wrap{max-width:1250px;margin:0 auto;padding:14px}
.title{font-size:20px;font-weight:900;color:var(--brown);margin-bottom:3px}
.hint{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5}

/* GRID & STATS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.stat{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow)}
.stat .l{font-size:10px;font-weight:900;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.stat .v{font-size:22px;font-weight:900;color:var(--brown)}

/* PANEL */
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.ph{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.pt{font-weight:900;color:var(--brown);font-size:14px}
.pb{padding:14px}

/* TABLE — scrollable on mobile */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
.tbl th{background:var(--bg);text-align:left;font-size:10px;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:9px 10px;border-bottom:1px solid #eee;vertical-align:middle}
.num{text-align:right;font-weight:900;font-variant-numeric:tabular-nums}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:900}
.b-green{background:#D8F3DC;color:var(--green)}
.b-red{background:#FFE5E7;color:var(--red)}
.b-blue{background:#D6EAF8;color:var(--blue)}
.b-orange{background:#FDE8D8;color:#7D2E00}
.b-gray{background:#E8E4DF;color:var(--muted)}
.b-yellow{background:#FFF3CD;color:#7A5700}

.empty{text-align:center;padding:24px;color:var(--muted)}
.good{color:var(--green)}.bad{color:var(--red)}.blue{color:var(--blue)}
.small{font-size:11px;color:var(--muted)}
.actions{display:flex;gap:8px;flex-wrap:wrap}

/* TRUCK CARDS */
.truck-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px}
.truck-card{background:#fff;border:2px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s,background .15s;min-height:var(--tap)}
.truck-card:active{background:#f0f0f0}
.truck-card.sel{border-color:var(--green);background:#D8F3DC}
.plate{font-family:'Courier New',monospace;font-size:15px;font-weight:900;letter-spacing:.04em}

/* MARKER BOX */
.markbox{position:sticky;bottom:8px;background:#fff;border:2px solid var(--orange);border-radius:var(--r);padding:14px;box-shadow:0 8px 28px rgba(0,0,0,.2);margin-bottom:12px;z-index:5}
.matgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.mat{border:2px solid var(--line);background:var(--soft);border-radius:10px;padding:16px 12px;cursor:pointer;font-weight:900;font-size:15px;line-height:1.4;text-align:center;transition:border-color .15s,background .15s;min-height:64px}
.mat:active{opacity:.8}
.mat.sel1{border-color:#8B4513;background:#FEF0E7}
.mat.sel2{border-color:var(--blue);background:#D6EAF8}

/* SESSION STATUS BAR */
.sess-bar{background:var(--soft);border:2px solid var(--green);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sess-info{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

/* TOAST */
.notice{position:fixed;top:62px;right:10px;left:10px;z-index:50;pointer-events:none}
@media(min-width:480px){.notice{left:auto;max-width:340px}}
.toast{background:var(--dark);color:#fff;padding:11px 14px;border-radius:10px;margin-bottom:8px;box-shadow:0 5px 18px rgba(0,0,0,.25);font-weight:800;font-size:14px;pointer-events:all}
.toast.err{background:var(--red)}

/* ===== MOBILE OVERRIDES ===== */
@media(max-width:600px){
  .wrap{padding:10px}
  .grid{grid-template-columns:1fr}
  .demo{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .matgrid{grid-template-columns:1fr 1fr}
  .truck-list{grid-template-columns:1fr}
  .top-r .uname{display:none}
  .tbl{font-size:12px;min-width:400px}
  .tbl th,.tbl td{padding:7px 8px}
  .btn-sm{padding:7px 10px;font-size:12px}
  .stat .v{font-size:20px}
  .title{font-size:18px}
  /* hide less important table cols on mobile */
  .hide-mob{display:none}
}
@media(max-width:380px){
  .stats{grid-template-columns:1fr 1fr}
  .matgrid{grid-template-columns:1fr 1fr}
}

/* PRINT */
@media print{
  body{background:#fff!important;font-size:12px}
  .top,.tabs,.btn,.btn-sm,.notice,button{display:none!important}
  .wrap{padding:4px!important;max-width:100%!important}
  .panel{box-shadow:none!important;border:1px solid #ccc!important;margin-bottom:8px!important}
  .tbl-wrap{overflow:visible!important}
  .tbl{min-width:0!important;font-size:11px}
  .hide-mob{display:table-cell!important}
  .print-only{display:block!important}
  .no-print{display:none!important}
  @page{margin:10mm}
}
.print-only{display:none}
</style>
</head>
<body>

<div id="auth">
  <div class="auth-card">
    <div class="logo">Северное <span>Бузачи</span></div>
    <div class="sub">Учёт рейсов, складов, дизеля, ПП и расчётов</div>
    <div id="authErr" class="err hidden"></div>
    <div class="field"><label>Логин</label><input id="login" autocomplete="username" placeholder="Введите логин"></div>
    <div class="field"><label>Пароль</label><input id="pass" type="password" autocomplete="current-password" placeholder="Введите пароль"></div>
    <button class="btn btn-main" onclick="doLogin()" type="button">Войти</button>
  </div>
</div>

<div id="app">
  <div class="top">
    <div class="top-logo">Сев. <span>Бузачи</span></div>
    <div class="top-r">
      <span id="userName" class="uname"></span>
      <span id="userRole" class="role"></span>
      <span id="syncDot" style="width:8px;height:8px;border-radius:50%;background:#4CAF50;display:inline-block;margin-right:2px" title="Синхронизировано"></span><button class="logout" onclick="logout()" type="button">Выйти</button>
    </div>
  </div>
  <div id="tabs" class="tabs"></div>
  <div id="content" class="wrap"></div>
</div>
<div id="notice" class="notice"></div>

<script>
const MAT_VOL={'Грунт':17,'ПГС':15};
const ROLE_NAMES={admin:'Админ',otmet:'Отметчик',master:'Мастер',prorab:'Прораб',fueler:'Заправщик'};
// Default admin — always works even if Firebase is empty
const DEFAULT_ADMIN={id:'admin',login:'admin',name:'Администратор',role:'admin'};
let CU=null,activeTab='',selTruck='',calcMonth=new Date().toISOString().slice(0,7),clockTimer=null;

function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2,8)}
function byName(d,login){if(!login)return '—';if(login===DEFAULT_ADMIN.login)return DEFAULT_ADMIN.name;let u=(d.users||[]).find(x=>x.login===login);return u?u.name:login;}
function today(){let d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmt(n){return (+n||0).toLocaleString('ru-RU',{maximumFractionDigits:2})}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function time(ts){return new Date(ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function dateTime(ts){return new Date(ts).toLocaleString('ru-RU')}
async function sha256(s){
  const bytes=new TextEncoder().encode(String(s));
  const hash=await crypto.subtle.digest('SHA-256',bytes);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function passwordMatches(u,p){
  if(u.passHash)return u.passHash===await sha256(p);
  if(u.pass)return u.pass===p;
  return false;
}

// emptyClean — чистая структура без демо-данных (для Firebase)
function emptyClean(){
  return {
    users:[],ppSpec:[],
    contractors:[],trucks:[],objects:[],quarries:[],warehouses:[],
    routes:[],trips:[],periods:[],dieselIn:[],dieselOut:[],pp:[],
    marker:{},norms:[],spectech:[],hours:[],specFuel:[],truckDays:[],
    prices:{transportRate:52,dieselPrice:275,ppPrice:6500}
  };
}
// empty — с демо-данными (только для локального fallback)
function empty(){
  return {
    contractors:[{id:'c1',name:'ТОО Бузачи Транс'},{id:'c2',name:'ИП Иванов'}],
    trucks:[
      {id:'t1',plate:'А123БВ77',driver:'Иванов А.А.',contractorId:'c1',status:'line'},
      {id:'t2',plate:'Е456ГД77',driver:'Петров Б.Б.',contractorId:'c2',status:'line'},
      {id:'t3',plate:'К789ЖЗ77',driver:'Сидоров В.В.',contractorId:'c1',status:'repair'}
    ],
    objects:[{id:'o1',name:'Площадка Б-12'},{id:'o2',name:'Площадка Б-15'}],
    quarries:[{id:'q1',name:'Карьер 1'},{id:'q2',name:'Карьер 2'}],
    warehouses:[{id:'w1',name:'Склад 1'},{id:'w2',name:'Склад 2'},{id:'w3',name:'Склад 3'}],
    users:[],routes:[],trips:[],periods:[],dieselIn:[],dieselOut:[],pp:[],marker:{},norms:[],spectech:[],hours:[],specFuel:[],truckDays:[],
    prices:{transportRate:52,dieselPrice:275,ppPrice:6500}
  };
}

// ── Firebase REST API (без SDK) ──────────────────────────────
const FB_URL = 'https://buzachi-29b84-default-rtdb.europe-west1.firebasedatabase.app/buzachi.json';

let _cache = null;
let _pollTimer = null;
let _lastSaveTime = 0;

async function fbGet() {
  const r = await fetch(FB_URL);
  if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
  return await r.json();
}

async function fbSet(data) {
  try {
    const r = await fetch(FB_URL, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return true;
  } catch(e) { return false; }
}

function mergeCache(val) {
  if (!val || typeof val !== 'object') val = emptyClean();
  let e = emptyClean();
  Object.keys(e).forEach(k => {
    const def = e[k];
    const cur = val[k];
    if (cur === undefined || cur === null) {
      val[k] = def;
    } else if (Array.isArray(def) && !Array.isArray(cur)) {
      val[k] = [];
    } else if (!Array.isArray(def) && typeof def === 'object' && typeof cur !== 'object') {
      val[k] = def;
    }
  });
  return val;
}

function dbSubscribe() {
  // Initial load
  fbGet().then(val => {
    val = mergeCache(val);
    _cache = val;
    buildTabs();
    // If empty, save clean structure
    if (!val.contractors || val.contractors.length === 0) {
      fbSet(val);
    }
  }).catch(() => {
    _cache = emptyClean();
    buildTabs();
    toast('Нет связи с базой данных', 'err');
  });

  // Poll every 8 seconds for updates from other devices
  _pollTimer = setInterval(async () => {
    if (!CU) return;
    try {
      const val = await fbGet();
      if (!val) return;
      const merged = mergeCache(val);
      // Only update if data actually changed and we didn't just save
      if (Date.now() - _lastSaveTime > 3000) {
        const changed = JSON.stringify(merged) !== JSON.stringify(_cache);
        if (changed) {
          _cache = merged;
          if (activeTab) {
            let skip = (activeTab === 'marker' && sessGet('mat') && sessGet('src'));
            if (!skip) render(activeTab);
          }
        }
      }
    } catch(e) {}
  }, 8000);
}

function dbUnsubscribe() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  _cache = null;
}

function load() {
  return _cache || emptyClean();
}

function save(d) {
  _cache = d;
  _lastSaveTime = Date.now();
  const dot = document.getElementById('syncDot');
  if (dot) dot.style.background = '#FF9800';
  fbSet(d).then(ok => {
    if (dot) dot.style.background = ok ? '#4CAF50' : '#F44336';
    if (!ok) toast('Ошибка сохранения — проверьте интернет', 'err');
  });
  return true;
}
function toast(msg,type){
  let w=document.getElementById('notice'),x=document.createElement('div');
  x.className='toast'+(type==='err'?' err':'');
  x.textContent=msg;w.appendChild(x);
  setTimeout(()=>x.remove(),3000);
}
function get(arr,id){return arr.find(x=>String(x.id)===String(id))}
function contractor(d,id){return get(d.contractors,id)?.name||'Без подрядчика'}
function ent(d,type,id){
  if(type==='quarry')return get(d.quarries,id)?.name||'Карьер удалён';
  if(type==='warehouse')return get(d.warehouses,id)?.name||'Склад удалён';
  if(type==='object')return get(d.objects,id)?.name||'Объект удалён';
  return '—';
}
function typeName(t){return {quarry:'Карьер',warehouse:'Склад',object:'Площадка'}[t]||t}
function routeKey(ft,fi,tt,ti){return [ft,fi,tt,ti].join('|')}
function ensureRoute(d,ft,fi,tt,ti){
  let key=routeKey(ft,fi,tt,ti),r=d.routes.find(x=>x.key===key);
  if(!r){r={id:uid(),key,fromType:ft,fromId:fi,toType:tt,toId:ti,km:''};d.routes.push(r)}
  return r;
}
function rKm(d,key){let r=d.routes.find(x=>x.key===key);return +(r&&r.km)||0}
function rTitle(d,r){return typeName(r.fromType)+': '+ent(d,r.fromType,r.fromId)+' → '+typeName(r.toType)+': '+ent(d,r.toType,r.toId)}
function parseVal(v){let p=String(v).split('|');return {type:p[0],id:p[1]}}
function monthOf(x,m){return String(x||'').slice(0,7)===m}
function dieselIn(d){return d.dieselIn.reduce((s,x)=>s+(+x.liters||0),0)}
function dieselOut(d){return d.dieselOut.reduce((s,x)=>s+(+x.liters||0),0)}
function dieselRest(d){let sf=(d.specFuel||[]).reduce((s,x)=>s+(+x.liters||0),0);return dieselIn(d)-dieselOut(d)-sf}
function tbl(content){return '<div class="tbl-wrap">'+content+'</div>'}
function sourceOpts(d){
  return d.quarries.map(x=>'<option value="quarry|'+x.id+'">Карьер: '+esc(x.name)+'</option>').join('')
        +d.warehouses.map(x=>'<option value="warehouse|'+x.id+'">Склад: '+esc(x.name)+'</option>').join('');
}
function destOpts(d){
  return d.objects.map(x=>'<option value="object|'+x.id+'">Площадка: '+esc(x.name)+'</option>').join('')
        +d.warehouses.map(x=>'<option value="warehouse|'+x.id+'">Склад: '+esc(x.name)+'</option>').join('');
}
function whBalance(d){
  let b={};
  d.warehouses.forEach(w=>{b[w.id]={'Грунт':{in:0,out:0,rest:0},'ПГС':{in:0,out:0,rest:0}}});
  d.trips.forEach(t=>{
    if(t.toType==='warehouse'&&b[t.toId])b[t.toId][t.material].in+=+t.m3||0;
    if(t.fromType==='warehouse'&&b[t.fromId])b[t.fromId][t.material].out+=+t.m3||0;
  });
  Object.keys(b).forEach(w=>['Грунт','ПГС'].forEach(m=>{b[w][m].rest=b[w][m].in-b[w][m].out}));
  return b;
}

async function doLogin(){
  let l=document.getElementById('login').value.trim(),
      p=document.getElementById('pass').value;
  if(!l||!p){
    document.getElementById('authErr').textContent='Введите логин и пароль';
    document.getElementById('authErr').classList.remove('hidden');return;
  }
  document.getElementById('authErr').classList.add('hidden');
  let btn=document.querySelector('#auth .btn-main');
  btn.textContent='Вход...';btn.disabled=true;

  // Fetch with timeout 8 seconds
  let timer=setTimeout(()=>{
    showAuthErr('Сервер не отвечает (таймаут). Проверьте интернет.');
  },8000);

  fbGet().then(async data=>{
    clearTimeout(timer);
    const users=data&&data.users?data.users:[];
    let u=users.find(x=>x.login===l&&x.active!==false);
    if(u && !(await passwordMatches(u,p))) u=null;
    if(!u){
      showAuthErr('Неверный логин или пароль');
      return;
    }
    if(u.pass&&!u.passHash){u.passHash=await sha256(p);delete u.pass;save(data);}
    finishLogin(u);
  }).catch(err=>{
    clearTimeout(timer);
    showAuthErr('Ошибка подключения: '+err.message);
  });
}

function showAuthErr(msg){
  let e=document.getElementById('authErr');
  e.textContent=msg;e.classList.remove('hidden');
  let btn=document.querySelector('#auth .btn-main');
  btn.textContent='Войти';btn.disabled=false;
}

function finishLogin(u){
  CU=u;
  document.querySelector('#auth .btn-main').textContent='Войти';
  document.querySelector('#auth .btn-main').disabled=false;
  document.getElementById('auth').style.display='none';

function statusClick(btn){

function sessSetMat(m){
  sessSet('mat',m);
  let m1=document.getElementById('mat1'),m2=document.getElementById('mat2');
  if(m1){m1.classList.remove('sel1','sel2')}
  if(m2){m2.classList.remove('sel1','sel2')}
  if(m==='Грунт'&&m1)m1.classList.add('sel1');
  if(m==='ПГС'&&m2)m2.classList.add('sel2');
}
function saveSession(){
  let mat=sessGet('mat'),srcEl=document.getElementById('srcSel');
  if(!mat)return toast('Выберите материал','err');
  if(!srcEl||!srcEl.value)return toast('Выберите источник','err');
  sessSet('src',srcEl.value);
  let d=load(),obj=d.marker['object_'+CU.login];
  d.periods.push({id:uid(),ts:Date.now(),date:today(),objectId:obj,material:mat,action:'start',by:CU.login});
  if(save(d)){toast('Смена начата: '+mat);render(activeTab)}
}
function endShift(){
  if(!confirm('Завершить смену?'))return;
  let d=load(),obj=d.marker['object_'+CU.login],mat=sessGet('mat');
  if(obj&&mat){d.periods.push({id:uid(),ts:Date.now(),date:today(),objectId:obj,material:mat,action:'end',by:CU.login});save(d)}
  sessClear();toast('Смена завершена');render(activeTab);
}
function saveFixedObject(){
  let d=load(),val=document.getElementById('fixedObj').value;
  if(!val)return toast('Выберите площадку','err');
  d.marker['object_'+CU.login]=val;
  if(save(d)){toast('Объект закреплён');render(activeTab)}
}
function changeFixedObject(){
  if(!confirm('Сменить объект или режим работы?'))return;
  let d=load();d.marker['object_'+CU.login]='';sessClear();
  if(save(d))render(activeTab);
}
function startClock(){let tick=()=>{let e=document.getElementById('clock');if(e)e.textContent=new Date().toLocaleTimeString('ru-RU')};tick();clockTimer=setInterval(tick,1000)}
function selectTruck(id){
  selTruck=id;
  document.querySelectorAll('.truck-card').forEach(x=>x.classList.remove('sel'));
  let e=document.getElementById('truck_'+id);if(e)e.classList.add('sel');
  let b=document.getElementById('confirmBtn');
  if(b){let mat=sessGet('mat');b.disabled=false;b.textContent='✓ Отметить рейс — '+mat+' '+MAT_VOL[mat]+' м³'}
}
function confirmTrip(){
  let d=load(),obj=d.marker['object_'+CU.login],tr=get(d.trucks,selTruck);
  let mat=sessGet('mat'),src=sessGet('src');
  if(!tr)return toast('Выберите самосвал','err');
  if(!mat||!src)return toast('Нет настроек смены','err');
  if(!obj)return toast('Нет объекта','err');
  let srcP=parseVal(src),rt=ensureRoute(d,srcP.type,srcP.id,'object',obj);
  d.trips.push({id:uid(),ts:Date.now(),date:today(),truckId:tr.id,plate:tr.plate,driver:tr.driver,contractorId:tr.contractorId,material:mat,m3:MAT_VOL[mat],fromType:srcP.type,fromId:srcP.id,toType:'object',toId:obj,routeKey:rt.key,by:CU.login});
  if(save(d)){toast('Рейс записан ✓ — '+tr.plate);selTruck='';render(activeTab)}
}

function cRate(d,cid,key){let con=get(d.contractors,cid);if(con&&con.rates&&con.rates[key]!==undefined&&con.rates[key]!=='')return +con.rates[key];return +d.prices[key]||0;}
function contractorCalc(d,cid,m){
  let gross=0,missing=0,trips=0,m3=0;
  d.trips.filter(t=>t.contractorId===cid&&monthOf(t.date,m)).forEach(t=>{
    trips++;m3+=+t.m3||0;
    let km=rKm(d,t.routeKey);if(!km){missing++;return}
    gross+=t.m3*km*cRate(d,cid,'transportRate');
  });
  let liters=d.dieselOut.filter(f=>f.contractorId===cid&&monthOf(f.date,m)).reduce((s,f)=>s+(+f.liters||0),0),
      diesel=liters*cRate(d,cid,'dieselPrice'),
      days=d.pp.filter(p=>p.contractorId===cid&&monthOf(p.date,m)).reduce((s,p)=>s+(+p.days||0),0),
      pp=days*cRate(d,cid,'ppPrice'),
      specH=0,specPay=0;
  (d.spectech||[]).filter(s=>s.contractorId===cid).forEach(s=>{
    let hrs=(d.hours||[]).filter(h=>h.stId===s.id&&monthOf(h.date,m)&&h.status==='work').reduce((a,h)=>a+(+h.hours||0),0);
    let rate=+s.hourRate||cRate(d,cid,'hourRate')||0;
    specH+=hrs;specPay+=hrs*rate;
  });
  return {gross,missing,trips,m3,liters,diesel,days,pp,specH,specPay,net:gross+specPay-diesel-pp};
}

// Slope (откос) = 2.5m added to each side → adds 2*2.5=5m to length and width
const SLOPE=2.5; // metres each side
const GRUNT_H=0.65; // грунт height metres
const PGS_H=0.20;   // пгс height metres

function calcPad(L,W){
  // with slope on all 4 sides
  let Le=L+2*SLOPE, We=W+2*SLOPE;
  let area=Le*We;
  return {Le,We,area,grunt:area*GRUNT_H,pgs:area*PGS_H};
}
function calcRoad(L,W,r20,r30){
  // straight section
  let straight=L*W;
  // each radius = quarter-circle area: π*R²/4 (one radius = one turn)
  let rad20=r20*(Math.PI*20*20/4);
  let rad30=r30*(Math.PI*30*30/4);
  // slope adds to both sides of width (2*SLOPE on width, length grows by r counts)
  let Le=L+2*SLOPE, We=W+2*SLOPE;
  let straightSloped=Le*We;
  // for radii we add slope to radius: (R+SLOPE)²*π/4
  let rad20s=r20*(Math.PI*(20+SLOPE)*(20+SLOPE)/4);
  let rad30s=r30*(Math.PI*(30+SLOPE)*(30+SLOPE)/4);
  let area=straightSloped+rad20s+rad30s;
  return {area,grunt:area*GRUNT_H,pgs:area*PGS_H,straight:straightSloped,rad20s,rad30s};
}
function objFactual(d,objId){
  let gr=0,pg=0;
  d.trips.filter(t=>t.toType==='object'&&t.toId===objId).forEach(t=>{
    if(t.material==='Грунт')gr+=+t.m3||0;
    else pg+=+t.m3||0;
  });
  return {gr,pg};
}

    +'<div style="width:'+pct.toFixed(1)+'%;height:8px;border-radius:999px;background:'+color+';transition:width .3s"></div></div>'
    +'<div class="small" style="margin-top:2px">'+fmt(done)+' / '+fmt(total)+' м³ ('+pct.toFixed(0)+'%)</div>';
}

function calcNormPreview(){
  let L=+document.getElementById('nPadL')?.value||0;
  let W=+document.getElementById('nPadW')?.value||0;
  let gH=+document.getElementById('nGruntH')?.value||GRUNT_H;
  let pH=+document.getElementById('nPgsH')?.value||PGS_H;
  let hasCb=document.getElementById('nHasRoad');
  let hasRoad=hasCb&&hasCb.checked;
  let rf=document.getElementById('roadFields');
  if(rf)rf.classList.toggle('hidden',!hasRoad);

  let padPrev=document.getElementById('padPreview');
  let roadPrev=document.getElementById('roadPreview');
  let totalDiv=document.getElementById('normTotal');

  let padG=0,padP=0,padArea=0,Le=0,We=0;
  if(L>0&&W>0){
    let p=calcPad(L,W);Le=p.Le;We=p.We;padArea=p.area;
    padG=padArea*gH; padP=padArea*pH;
    if(padPrev)padPrev.innerHTML='С откосом: <b>'+fmt(Le)+'×'+fmt(We)+' = '+fmt(padArea)+' м²</b>'
      +' → Грунт: <b>'+fmt(padG)+' м³</b>, ПГС: <b>'+fmt(padP)+' м³</b>';
  } else {if(padPrev)padPrev.innerHTML=''}

  let roadG=0,roadP=0,roadArea=0;
  if(hasRoad){
    let rL=+document.getElementById('nRoadL')?.value||0;
    let rW=+document.getElementById('nRoadW')?.value||0;
    let r20=+document.getElementById('nR20')?.value||0;
    let r30=+document.getElementById('nR30')?.value||0;
    if(rL>0&&rW>0){
      let r=calcRoad(rL,rW,r20,r30);
      roadArea=r.area; roadG=roadArea*gH; roadP=roadArea*pH;
      if(roadPrev)roadPrev.innerHTML='Площадь с откосом: <b>'+fmt(roadArea)+' м²</b>'
        +' → Грунт: <b>'+fmt(roadG)+' м³</b>, ПГС: <b>'+fmt(roadP)+' м³</b>';
    } else {if(roadPrev)roadPrev.innerHTML=''}
  } else {if(roadPrev)roadPrev.innerHTML=''}

  let totalG=padG+roadG, totalP=padP+roadP;
  if(totalDiv){
    if(totalG>0||totalP>0){
      totalDiv.style.display='block';
      totalDiv.innerHTML='<div style="font-weight:900;margin-bottom:6px">📊 Итого по объекту:</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
        +'<div style="background:rgba(255,255,255,.15);border-radius:8px;padding:10px"><div class="small">🪨 Грунт</div><div style="font-size:18px;font-weight:900">'+fmt(totalG)+' м³</div></div>'
        +'<div style="background:rgba(255,255,255,.15);border-radius:8px;padding:10px"><div class="small">🏗️ ПГС</div><div style="font-size:18px;font-weight:900">'+fmt(totalP)+' м³</div></div>'
        +'</div>';
    } else { totalDiv.style.display='none' }
  }
}

function saveNorm(){
  let d=load();if(!d.norms)d.norms=[];
  let objId=document.getElementById('normObj').value;
  let L=+document.getElementById('nPadL').value||0;
  let W=+document.getElementById('nPadW').value||0;
  let gH=+document.getElementById('nGruntH').value||GRUNT_H;
  let pH=+document.getElementById('nPgsH').value||PGS_H;
  if(!objId)return toast('Выберите объект','err');
  if(L<=0||W<=0)return toast('Введите длину и ширину площадки','err');
  let pad=calcPad(L,W);
  let padGrunt=pad.area*gH, padPgs=pad.area*pH;
  let hasRoad=document.getElementById('nHasRoad').checked;
  let roadGrunt=0,roadPgs=0,roadArea=0,roadL=0,roadW=0,roadR20=0,roadR30=0;
  if(hasRoad){
    roadL=+document.getElementById('nRoadL').value||0;
    roadW=+document.getElementById('nRoadW').value||0;
    roadR20=+document.getElementById('nR20').value||0;
    roadR30=+document.getElementById('nR30').value||0;
    if(roadL>0&&roadW>0){
      let r=calcRoad(roadL,roadW,roadR20,roadR30);
      roadArea=r.area;roadGrunt=roadArea*gH;roadPgs=roadArea*pH;
    }
  }
  // remove existing for this object
  d.norms=d.norms.filter(n=>n.objectId!==objId);
  d.norms.push({id:uid(),objectId:objId,
    padL:L,padW:W,gH,pH,padLe:pad.Le,padWe:pad.We,padArea:pad.area,
    padGrunt,padPgs,
    hasRoad,roadL,roadW,roadR20,roadR30,roadArea,roadGrunt,roadPgs
  });
  if(save(d)){toast('Норма сохранена');render(activeTab)}
}

function delNorm(id){
  if(!confirm('Удалить норму?'))return;
  let d=load();d.norms=d.norms.filter(n=>n.id!==id);
  if(save(d)){toast('Удалено');render(activeTab)}
}

function editNorm(id){
  let d=load(),n=get(d.norms,id);if(!n)return;
  // scroll to form and fill it
  document.getElementById('normObj').value=n.objectId;
  document.getElementById('nPadL').value=n.padL;
  document.getElementById('nPadW').value=n.padW;
  document.getElementById('nGruntH').value=n.gH||GRUNT_H;
  document.getElementById('nPgsH').value=n.pH||PGS_H;
  let cb=document.getElementById('nHasRoad');
  cb.checked=!!n.hasRoad;
  let rf=document.getElementById('roadFields');
  if(rf)rf.classList.toggle('hidden',!n.hasRoad);
  if(n.hasRoad){
    document.getElementById('nRoadL').value=n.roadL||'';
    document.getElementById('nRoadW').value=n.roadW||'';
    document.getElementById('nR20').value=n.roadR20||0;
    document.getElementById('nR30').value=n.roadR30||0;
  }
  calcNormPreview();
  document.getElementById('normObj').scrollIntoView({behavior:'smooth',block:'center'});
}


/* ======== SPECTECH ======== */
function pageSpectech(){
  let d=load();
  if(!d.spectech)d.spectech=[];
  if(!d.hours)d.hours=[];
  let cOpts=d.contractors.map(con=>'<option value="'+con.id+'">'+esc(con.name)+'</option>').join('');

  // Monthly summary per spectech
  let mOpts='';
  let months={};
  d.hours.forEach(h=>months[h.date.slice(0,7)]=1);
  Object.keys(months).sort().reverse().forEach(m=>{mOpts+='<option value="'+m+'">'+m+'</option>';});
  let selMonth=document.getElementById?.('stMonthSel')?.value||new Date().toISOString().slice(0,7);

  // Build hours summary table
  let sumRows=d.spectech.map(s=>{
    let hAll=(d.hours||[]).filter(h=>h.stId===s.id);
    let hMonth=hAll.filter(h=>h.date.slice(0,7)===selMonth);
    let workH=hMonth.filter(h=>h.status==='work').reduce((a,h)=>a+(+h.hours||0),0);
    let repH=hMonth.filter(h=>h.status==='repair').reduce((a,h)=>a+(+h.hours||0),0);
    let rainH=hMonth.filter(h=>h.status==='rain').reduce((a,h)=>a+(+h.hours||0),0);
    let totalH=workH+repH+rainH;
    let rate=+s.hourRate||0;
    let pay=workH*rate;
    return '<tr>'
      +'<td><b>'+esc(s.name)+'</b><div class="small">'+esc(s.driver)+' · '+esc(contractor(d,s.contractorId))+'</div></td>'
      +'<td><span class="badge '+(s.status==='line'?'b-green':'b-red')+'">'+(s.status==='line'?'Работает':'Ремонт')+'</span></td>'
      +'<td class="num good">'+fmt(workH)+' ч</td>'
      +'<td class="num bad">'+fmt(repH)+' ч</td>'
      +'<td class="num blue">'+fmt(rainH)+' ч</td>'
      +'<td class="num">'+fmt(totalH)+' ч</td>'
      +(rate?'<td class="num good">'+fmt(pay)+' ₸</td>':'<td class="small">нет ставки</td>')
      +'<td><input type="number" placeholder="тг/ч" value="'+(s.hourRate||'')+'" data-id="'+s.id+'" oninput="saveStRateEl(this)" style="width:90px;padding:6px;border:1px solid #ddd;border-radius:8px"></td>'
      +'<td><button class="btn btn-red btn-sm" data-id="'+s.id+'" onclick="rmStById(this)">✕</button></td>'
      +'</tr>';
  }).join('')||'<tr><td colspan="9"><div class="empty">Спецтехники нет</div></td></tr>';

  // Total work hours this month
  let totalWork=(d.spectech||[]).reduce((sum,s)=>{
    return sum+(d.hours||[]).filter(h=>h.stId===s.id&&h.date.slice(0,7)===selMonth&&h.status==='work').reduce((a,h)=>a+(+h.hours||0),0);
  },0);

  return '<div class="title">🚜 Спецтехника</div>'
    // Add form
    +'<div class="panel"><div class="ph"><div class="pt">Добавить технику</div></div><div class="pb"><div class="grid">'
    +'<div class="field"><label>Название / номер</label><input id="stName" placeholder="Экскаватор CAT 320"></div>'
    +'<div class="field"><label>Оператор / водитель</label><input id="stDriver" placeholder="Иванов А.А."></div>'
    +'<div class="field"><label>Подрядчик</label><select id="stContr">'+cOpts+'</select></div>'
    +'</div><button class="btn btn-green" onclick="addSpectech()">Добавить</button></div></div>'
    // Hours summary
    +'<div class="panel"><div class="ph"><div class="pt">Часы и расчёт по спецтехнике</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<span class="badge b-green">Работа: '+fmt(totalWork)+' ч</span>'
    +'<select id="stMonthSel" onchange="render(activeTab)" style="padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px">'
    +(mOpts||'<option value="'+selMonth+'">'+selMonth+'</option>')
    +'</select>'
    +'</div></div>'
    +tbl('<table class="tbl"><thead><tr><th>Техника</th><th>Статус</th><th class="good">Работа</th><th class="bad">Ремонт</th><th class="blue">Дождь</th><th>Итого</th><th>К оплате</th><th>Ставка тг/ч</th><th></th></tr></thead><tbody>'+sumRows+'</tbody></table>')
    +'</div>';
}

function addHours(){
  let d=load();if(!d.hours)d.hours=[];
  let stId=document.getElementById('hSt').value,
      hours=parseFloat(document.getElementById('hHours').value),
      date=document.getElementById('hDate').value||today(),
      status=document.getElementById('hStatus').value,
      comment=document.getElementById('hComment').value.trim();
  if(!stId)return toast('Выберите технику','err');
  if(isNaN(hours)||hours<0||hours>24)return toast('Часы: от 0 до 24','err');
  d.hours.push({id:uid(),ts:Date.now(),date,stId,hours,status,comment,by:CU.login});
  if(save(d)){toast('Записано — '+{work:'Работа',repair:'Ремонт',rain:'Дождь'}[status]+' '+hours+'ч');render(activeTab)}
}
function openEditHours(id){
  let d=load(),h=get(d.hours,id);if(!h)return;
  let nh=prompt('Часов (0–24), было '+h.hours+':',h.hours);
  if(nh===null)return;
  let v=parseFloat(nh);if(isNaN(v)||v<0||v>24)return toast('Неверное значение','err');
  h.hours=v;h.editBy=CU.login;h.editTs=Date.now();
  if(save(d)){toast('Изменено');render(activeTab)}
}
function delHours(id){if(!confirm('Удалить?'))return;let d=load();d.hours=d.hours.filter(x=>x.id!==id);if(save(d)){toast('Удалено');render(activeTab)}}
function markRainAllTrucks(){
  let d=load();if(!d.truckDays)d.truckDays=[];
  let date=document.getElementById('rainDate').value||today();
  let added=0;
  d.trucks.forEach(t=>{
    if(d.truckDays.some(r=>r.truckId===t.id&&r.date===date))return;
    d.truckDays.push({id:uid(),ts:Date.now(),date,truckId:t.id,plate:t.plate,driver:t.driver,contractorId:t.contractorId,status:'rain',comment:'Дождь',by:CU.login});
    added++;
  });
  if(!added)return toast('На эту дату уже есть записи для всех самосвалов','err');
  if(save(d)){toast('Дождь отмечен для '+added+' самосвалов');render(activeTab)}
}
function delTruckDay(id){if(!confirm('Удалить?'))return;let d=load();d.truckDays=(d.truckDays||[]).filter(x=>x.id!==id);if(save(d)){toast('Удалено');render(activeTab)}}

        +'<td>'+esc(ent(d,t.fromType,t.fromId))+' → '+esc(ent(d,t.toType,t.toId))+'</td></tr>').join('');
      let totalM=tr.trips.reduce((s,t)=>s+(+t.m3||0),0);

/* ======== USERS MANAGEMENT ======== */
function pageUsers(){
  if(CU.role!=='admin')return '<div class="empty">Нет доступа</div>';
  let d=load();
  if(!d.users)d.users=[];
  const roles=[['admin','👑 Админ'],['otmet','✅ Отметчик'],['master','🏗 Мастер'],['prorab','✏️ Прораб'],['fueler','⛽ Заправщик']];
  let roleOpts=roles.map(r=>'<option value="'+r[0]+'">'+r[1]+'</option>').join('');

  let rows=d.users.map(u=>{
    let active=u.active!==false;
    let roleLabel=roles.find(r=>r[0]===u.role)?.[1]||u.role;
    return '<tr>'
      +'<td><b>'+esc(u.login)+'</b></td>'
      +'<td>'+esc(u.name)+'</td>'
      +'<td>'+roleLabel+'</td>'
      +'<td><span class="badge '+(active?'b-green':'b-gray')+'">'+(active?'Активен':'Отключён')+'</span></td>'
      +'<td style="white-space:nowrap">'
      +'<button class="btn btn-ghost btn-sm" onclick="toggleUser(\''+u.id+'\')">'+(active?'Откл':'Вкл')+'</button> '
      +'<button class="btn btn-ghost btn-sm" onclick="resetPass(\''+u.id+'\')">🔑</button> '
      +'<button class="btn btn-red btn-sm" onclick="delUser(\''+u.id+'\')">✕</button>'
      +'</td></tr>';
  }).join('')||'<tr><td colspan="5"><div class="empty">Пользователей нет</div></td></tr>';

  return '<div class="title">👥 Пользователи</div>'
    +'<div class="hint">Каждый сотрудник входит со своим логином. Логин — латинские буквы/цифры.</div>'

    +'<div class="panel"><div class="ph"><div class="pt">Добавить пользователя</div></div><div class="pb">'
    +'<div class="grid">'
    +'<div class="field"><label>Логин</label><input id="uLogin" placeholder="ivanov_ali" autocomplete="off"></div>'
    +'<div class="field"><label>Пароль</label><input id="uPass" placeholder="минимум 4 символа" autocomplete="off"></div>'
    +'<div class="field"><label>Имя и фамилия</label><input id="uName" placeholder="Иванов Алихан"></div>'
    +'<div class="field"><label>Роль</label><select id="uRole">'+roleOpts+'</select></div>'
    +'</div>'
    +'<button class="btn btn-green" style="margin-top:6px" onclick="addUser()">Добавить пользователя</button>'
    +'</div></div>'

    +'<div class="panel"><div class="ph"><div class="pt">Список пользователей</div><span class="badge b-blue">'+d.users.length+'</span></div>'
    +tbl('<table class="tbl"><thead><tr><th>Логин</th><th>Имя</th><th>Роль</th><th>Статус</th><th>Действия</th></tr></thead><tbody>'+rows+'</tbody></table>')
    +'</div>'

    +'<div class="panel" style="border-left:4px solid var(--orange)"><div class="pb">'
    +'<div class="small" style="font-weight:900;text-transform:uppercase;margin-bottom:6px">🔐 Системный администратор</div>'
    +'<div class="small">Default built-in admin password is disabled. Use database users.</div>'
    +'</div></div>';
}

async function addUser(){
  let d=load();if(!d.users)d.users=[];
  let login=document.getElementById('uLogin').value.trim().toLowerCase(),
      pass=document.getElementById('uPass').value.trim(),
      name=document.getElementById('uName').value.trim(),
      role=document.getElementById('uRole').value;
  if(!login)return toast('Введите логин','err');
  if(!/^[a-z0-9_]+$/.test(login))return toast('Логин: только латинские буквы, цифры, _','err');
  if(login==='admin')return toast('Логин admin зарезервирован','err');
  if(pass.length<4)return toast('Пароль минимум 4 символа','err');
  if(!name)return toast('Введите имя','err');
  if(d.users.some(u=>u.login===login))return toast('Такой логин уже есть','err');
  d.users.push({id:uid(),login,passHash:await sha256(pass),name,role,active:true,created:Date.now(),createdBy:CU.login});
  if(save(d)){toast('Пользователь добавлен: '+login);render(activeTab)}
}

function toggleUser(id){
  let d=load(),u=get(d.users,id);if(!u)return;
  u.active=u.active===false?true:false;
  if(save(d)){toast(u.active?'Пользователь активирован':'Пользователь отключён');render(activeTab)}
}

async function resetPass(id){
  let newp=prompt('Новый пароль (минимум 4 символа):');
  if(!newp)return;
  if(newp.length<4)return toast('Минимум 4 символа','err');
  let d=load(),u=get(d.users,id);if(!u)return;
  u.passHash=await sha256(newp);delete u.pass;u.passChangedBy=CU.login;u.passChangedAt=Date.now();
  if(save(d)){toast('Пароль изменён для '+u.login)}
}

function delUser(id){
  if(!confirm('Удалить пользователя? Все его записи останутся.'))return;
  let d=load();d.users=d.users.filter(u=>u.id!==id);
  if(save(d)){toast('Удалено');render(activeTab)}
}


function saveConRate(cid,key,val){let d=load(),con=get(d.contractors,cid);if(!con)return;if(!con.rates)con.rates={};if(val===''||val===null)delete con.rates[key];else con.rates[key]=+val;save(d);}
function saveStHourRate(id,val){let d=load(),s=get(d.spectech||[],id);if(!s)return;s.hourRate=+val||0;save(d);toast('Ставка сохранена');}

const PRESENCE_URL='https://buzachi-29b84-default-rtdb.europe-west1.firebasedatabase.app/presence';
let _presenceTimer=null;
function writePresence(u){if(_presenceTimer)clearInterval(_presenceTimer);let ping=()=>fetch(PRESENCE_URL+'/'+u.login+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:u.name,role:u.role,login:u.login,ts:Date.now()})}).catch(()=>{});ping();_presenceTimer=setInterval(ping,30000);}
function removePresence(){if(_presenceTimer){clearInterval(_presenceTimer);_presenceTimer=null}if(CU)fetch(PRESENCE_URL+'/'+CU.login+'.json',{method:'DELETE'}).catch(()=>{});}
function pageOnline(){
  // Return placeholder immediately, fill async
  setTimeout(async function(){
    var wrap=document.getElementById('onlineContent');
    if(!wrap)return;
    var data={};
    try{var r=await fetch(PRESENCE_URL+'.json');if(r.ok)data=await r.json()||{};}catch(e){}
    var now=Date.now();
    var icons={admin:'👑',otmet:'✅',master:'🏗',prorab:'✏️',fueler:'⛽'};
    var users=Object.values(data).filter(function(u){return now-u.ts<120000;}).sort(function(a,b){return a.name.localeCompare(b.name);});
    var rows=users.map(function(u){
      var ago=Math.round((now-u.ts)/1000);
      var agoStr=ago<60?ago+'с назад':Math.round(ago/60)+'мин назад';
      return '<tr><td>'+(icons[u.role]||'👤')+' <b>'+esc(u.name)+'</b></td>'
        +'<td><span class="badge b-green">'+(ROLE_NAMES[u.role]||u.role)+'</span></td>'
        +'<td class="small">'+agoStr+'</td></tr>';
    }).join('');
    if(!rows)rows='<tr><td colspan="3"><div class="empty">Никого нет онлайн</div></td></tr>';
    wrap.innerHTML=tbl('<table class="tbl"><thead><tr><th>Пользователь</th><th>Роль</th><th>Активность</th></tr></thead><tbody>'+rows+'</tbody></table>');
  },50);
  return '<div class="title">🟢 Кто онлайн</div>'
    +'<div class="hint">Активные за последние 2 мин.</div>'
    +'<div class="panel"><div class="ph"><div class="pt">Сейчас на сайте</div>'

}
